version: 2

updates:
  # Python dependencies — requirements.txt + pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # OCI SDK: pin major version — breaking changes are common across minors
      - dependency-name: "oci"
        update-types: ["version-update:semver-major"]
      # MCP SDK: pin major — protocol changes require explicit review
      - dependency-name: "mcp"
        update-types: ["version-update:semver-major"]

  # Docker base image — python:3.11-slim
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"

  # Terraform providers — oracle/oci
  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # OCI Terraform provider: major versions require plan review
      - dependency-name: "oracle/oci"
        update-types: ["version-update:semver-major"]

  # GitHub Actions (if workflows are added later)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
